services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/UrlShortener.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__UrlShortenerDb: "Host=postgres;Port=5432;Database=urlshortener;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
