name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Integration tests spin up a real Postgres container via
      # Testcontainers - ubuntu-latest runners have Docker available
      # out of the box, no extra setup needed.
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
